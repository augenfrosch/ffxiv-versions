name: Data

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Check index line endings
        run: git ls-files --eol | (! grep -E '^i/(crlf|mixed)')
      - name: Check for missing re-exports
        run: cargo run --bin ffxiv-versions-re-export -- csv && git diff --exit-code
        run: cargo run --bin ffxiv-versions-re-export -- json && git diff --exit-code
